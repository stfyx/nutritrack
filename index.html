<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NutriTrack</title>
<style>
:root{
  --bg:#0e1310;
  --surface:#161d18;
  --surface-2:#1d2620;
  --line:rgba(242,239,230,.09);
  --text:#f2efe6;
  --text-dim:#93a194;
  --accent:#ff8a3d;
  --accent-2:#8fd9a8;
  --danger:#ff6b6b;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  font-family:Arial,Helvetica,sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;}
.dim{color:var(--text-dim);}
.good{color:var(--accent-2);}
.bad{color:var(--danger);}

/* ---------- top bar ---------- */
.topbar{
  position:relative;
  padding:18px 18px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--line);
  overflow:hidden;
}
.barcode-deco{
  position:absolute; inset:0;
  background:repeating-linear-gradient(90deg,
    var(--text) 0 2px, transparent 2px 5px,
    var(--text) 5px 6px, transparent 6px 12px,
    var(--text) 12px 15px, transparent 15px 22px,
    var(--text) 22px 23px, transparent 23px 30px);
  opacity:.06;
  pointer-events:none;
}
.topbar-row{position:relative;display:flex;align-items:center;justify-content:space-between;}
.brand{font-weight:800;font-size:19px;letter-spacing:.01em;}
.brand small{display:block;font-size:10px;letter-spacing:.18em;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:2px;}
.gear-btn{
  background:var(--surface-2);
  border:1px solid var(--line);
  color:var(--text);
  width:38px;height:38px;border-radius:50%;
  font-size:16px; cursor:pointer;
}

/* ---------- pages / cards ---------- */
.page{display:none;padding:16px 16px 100px;max-width:520px;margin:0 auto;}
.page.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-bottom:14px;
}
.card.note{font-size:13px;color:var(--text-dim);background:transparent;border-style:dashed;}
.eyebrow{
  text-transform:uppercase;
  font-size:11px;
  letter-spacing:.12em;
  color:var(--text-dim);
  font-weight:700;
  margin:0 0 12px;
}

/* hero calorie card */
.hero{position:relative;}
.hero-num{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:40px;font-weight:700;line-height:1;}
.hero-num.small{font-size:22px;}
.hero-target{font-size:15px;color:var(--text-dim);font-weight:400;}

.bar{height:8px;background:#2a322b;border-radius:10px;overflow:hidden;margin-top:6px;}
.bar.lg{height:10px;margin-top:14px;}
.fill{height:100%;border-radius:10px;transition:width .35s ease;}

.row{margin-top:14px;}
.row:first-of-type{margin-top:0;}
.row-top{display:flex;justify-content:space-between;align-items:center;font-size:14px;gap:10px;}

/* meals */
.item-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--line);}
.item-row:first-child{border-top:none;padding-top:0;}
.item-name{font-size:14px;}
.item-sub{font-size:12px;margin-top:2px;}
.empty{color:var(--text-dim);font-size:13px;margin:4px 0 0;}

/* ---------- buttons / inputs ---------- */
.btn{
  width:100%;
  padding:13px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:var(--surface-2);
  color:var(--text);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}
.btn.primary{background:var(--accent);color:#1a1208;}
.btn.ghost{background:transparent;border:1px solid var(--line);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{margin-top:10px;}

.icon-btn{
  background:transparent;border:none;color:var(--text-dim);
  font-size:15px;cursor:pointer;padding:4px 8px;border-radius:8px;
}
.icon-btn:hover{color:var(--danger);}

.num-input, select.num-input{
  width:100%;
  padding:10px 12px;
  background:var(--surface-2);
  border:1px solid var(--line);
  border-radius:10px;
  color:var(--text);
  font-size:14px;
  margin-top:4px;
}
.num-input.small{width:90px;text-align:right;margin-top:0;}
.field{display:flex;flex-direction:column;font-size:13px;color:var(--text-dim);margin-bottom:10px;gap:0;}
.field input,.field select{color:var(--text);}

.toggle{
  border:1px solid var(--line);background:var(--surface-2);color:var(--text-dim);
  padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
}
.toggle.on{background:var(--accent-2);color:#0e1310;border-color:transparent;}

/* ---------- day switcher ---------- */
.day-nav{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:14px;}
.day-arrow{background:var(--surface-2);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;}
.day-arrow:disabled{opacity:.35;cursor:default;}
.day-label{font-weight:700;font-size:14px;min-width:90px;text-align:center;}

/* ---------- add page / scanner ---------- */
.divider{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin:18px 0 12px;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}

#scanWrap{display:none;position:relative;margin-top:12px;border-radius:14px;overflow:hidden;background:#000;}
#reader{width:100%;}
#reader video{width:100%!important;display:block;border-radius:14px;}
.scan-corners span{position:absolute;width:26px;height:26px;border:3px solid var(--accent);pointer-events:none;}
.scan-corners .tl{top:14px;left:50%;margin-left:-130px;border-right:none;border-bottom:none;}
.scan-corners .tr{top:14px;left:50%;margin-left:104px;border-left:none;border-bottom:none;}
.scan-corners .bl{bottom:14px;left:50%;margin-left:-130px;border-right:none;border-top:none;}
.scan-corners .br{bottom:14px;left:50%;margin-left:104px;border-left:none;border-top:none;}
.scan-laser{
  position:absolute;left:50%;top:14px;width:260px;height:140px;margin-left:-130px;
  pointer-events:none;overflow:hidden;border-radius:6px;
}
.scan-laser::after{
  content:"";position:absolute;left:0;right:0;height:2px;background:var(--accent);
  box-shadow:0 0 8px var(--accent);
  animation:laser 1.6s ease-in-out infinite;
}
@keyframes laser{0%{top:6px;}50%{top:132px;}100%{top:6px;}}

#scanStatus{font-size:13px;color:var(--text-dim);margin:10px 0 0;min-height:18px;}

.result-row{
  display:flex;flex-direction:column;align-items:flex-start;width:100%;
  background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;margin-bottom:8px;cursor:pointer;color:var(--text);text-align:left;
}
.result-row:hover{border-color:var(--accent);}

/* ---------- progress chart ---------- */
.spark{width:100%;height:90px;margin-top:10px;}

/* ---------- sheet / overlay ---------- */
#sheetOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;justify-content:center;z-index:60;
}
#sheetOverlay.active{display:flex;}
.sheet{
  background:var(--surface);
  width:100%;max-width:480px;
  border-radius:20px 20px 0 0;
  padding:18px 18px 28px;
  max-height:85vh;overflow-y:auto;
  animation:sheetup .22s ease;
}
@keyframes sheetup{from{transform:translateY(30px);opacity:0;}to{transform:none;opacity:1;}}
.sheet-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.sheet-header h3{margin:0;font-size:17px;padding-right:10px;}
.preview{background:var(--surface-2);border-radius:10px;padding:12px;font-size:13px;display:flex;flex-direction:column;gap:4px;}

/* ---------- bottom nav ---------- */
.nav{
  position:fixed;bottom:0;left:0;width:100%;
  display:flex;justify-content:space-around;
  background:var(--surface);
  border-top:1px solid var(--line);
  padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  z-index:40;
}
.nav button{
  background:none;border:none;color:var(--text-dim);
  font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;flex:1;padding:4px 0;
}
.nav button svg{width:21px;height:21px;}
.nav button.active{color:var(--accent);}

@media (min-width:600px){
  .topbar,.nav{padding-left:calc((100% - 520px)/2 + 18px);padding-right:calc((100% - 520px)/2 + 18px);}
}

/* ---------- obsidian export sheet ---------- */
.obs-vault{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:12px;}
.obs-ok{background:#1a2e1a;border:1px solid #3a6a3a;border-radius:10px;padding:12px;font-size:13px;margin-bottom:12px;color:var(--accent-2);white-space:pre-wrap;}
.obs-warn{background:#2e1a1a;border:1px solid #6a3a3a;border-radius:10px;padding:12px;font-size:13px;margin-bottom:12px;line-height:1.5;}

/* ============================================================
   iOS PWA — safe areas, no zoom on inputs, tap feedback
   ============================================================ */
* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
button, a { user-select: none; }
body {
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}
/* Prevent iOS Safari from zooming when an input gets focus.
   The minimum font-size that avoids auto-zoom is 16px. */
.num-input,
select.num-input,
input[type="text"],
input[type="number"],
input[type="date"] {
  font-size: 16px !important;
}
/* Absorb the status-bar height (black-translucent pushes content under it) */
.topbar {
  padding-top: calc(max(20px, env(safe-area-inset-top)) + 6px);
}
/* Give the bottom nav enough room above the home indicator */
.nav {
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
}
/* Compensate in each page so content isn't hidden behind the nav */
.page {
  padding-bottom: calc(90px + env(safe-area-inset-bottom));
}
/* Smooth momentum scroll in all scrolling containers */
.sheet {
  -webkit-overflow-scrolling: touch;
}

<!-- PROGRESS -->

    <button class="btn primary" onclick="toggleWeightForm()">Actualizează greutatea</button>

<div class="page" id="activity"><div id="activityContent"></div></div>

<!-- SETTINGS / CONFIRM SHEET -->
<div id="sheetOverlay" onclick="sheetBackdropClick(event)">

</div>

<!-- NAV -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script>
/* ===================== NutriTrack — app logic ===================== */

const MEAL_LABELS = { breakfast: 'Mic dejun', lunch: 'Prânz', dinner: 'Cină', snack: 'Gustare' };
const MEAL_ORDER = ['breakfast', 'lunch', 'dinner', 'snack'];

/* Single source of truth for every tracked nutrient: key, label, unit,
   default daily target, and (where applicable) how to read it from an
   Open Food Facts product: the raw field name and the multiplier needed
   to convert OFF's gram-based value into the display unit. */
const NUTRIENTS = [
  { key: 'calories', label: 'Calorii', unit: 'kcal', target: 2200 },
  { key: 'protein', label: 'Proteine', unit: 'g', target: 150, off: 'proteins_100g', toUnit: 1 },
  { key: 'carbs', label: 'Carbohidrați', unit: 'g', target: 240, off: 'carbohydrates_100g', toUnit: 1 },
  { key: 'fat', label: 'Grăsimi', unit: 'g', target: 60, off: 'fat_100g', toUnit: 1 },
  { key: 'sodium', label: 'Sodiu', unit: 'mg', target: 2300, off: 'sodium_100g', toUnit: 1000 },
  { key: 'potassium', label: 'Potasiu', unit: 'mg', target: 4700, off: 'potassium_100g', toUnit: 1000 },
  { key: 'magnesium', label: 'Magneziu', unit: 'mg', target: 420, off: 'magnesium_100g', toUnit: 1000 },
  { key: 'calcium', label: 'Calciu', unit: 'mg', target: 1300, off: 'calcium_100g', toUnit: 1000 },
  { key: 'iron', label: 'Fier', unit: 'mg', target: 18, off: 'iron_100g', toUnit: 1000 },
  { key: 'zinc', label: 'Zinc', unit: 'mg', target: 11, off: 'zinc_100g', toUnit: 1000 },
  { key: 'vitaminD', label: 'Vitamina D', unit: 'mcg', target: 20, off: 'vitamin-d_100g', toUnit: 1000000 },
  { key: 'vitaminC', label: 'Vitamina C', unit: 'mg', target: 90, off: 'vitamin-c_100g', toUnit: 1000 },
  { key: 'fiber', label: 'Fibre', unit: 'g', target: 28, off: 'fiber_100g', toUnit: 1 }
];
const MACRO_KEYS = ['protein', 'carbs', 'fat'];
const MICRO_KEYS = ['sodium', 'potassium', 'magnesium', 'calcium', 'iron', 'zinc', 'vitaminD', 'vitaminC', 'fiber'];

function zeroNutrients() { const o = {}; NUTRIENTS.forEach(n => { o[n.key] = 0; }); return o; }
function defaultTargets() { const t = {}; NUTRIENTS.forEach(n => { t[n.key] = n.target; }); return t; }

/* ----------------------------- small helpers ----------------------------- */

function uid() { return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function isoDate(d) { return d.toISOString().slice(0, 10); }
function todayStr() { return isoDate(new Date()); }
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); return isoDate(d); }
function round(n) { return Math.round((n || 0) * 10) / 10; }
function fmt(n) { const r = round(n); return (Math.abs(r - Math.round(r)) < 0.05) ? String(Math.round(r)) : r.toFixed(1); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function dayLabel() {
  if (currentDate === todayStr()) return 'Azi';
  const y = new Date(); y.setDate(y.getDate() - 1);
  if (currentDate === isoDate(y)) return 'Ieri';
  return new Date(currentDate + 'T00:00:00').toLocaleDateString('ro-RO', { day: 'numeric', month: 'short' });
}

function mkItem(name, grams, nutrients) {
  return Object.assign({ id: uid(), name, grams }, zeroNutrients(), nutrients || {});
}
function mkActivityEntry(extra) { return Object.assign({ id: uid() }, extra); }

/* --------------------------- storage abstraction --------------------------
   Inside a Claude.ai artifact, window.storage gives real cross-session
   persistence (localStorage is blocked there). If this page is downloaded
   and hosted on a normal website, window.storage won't exist — in that
   case we fall back to localStorage, which works fine on a real site.
   Either way the app keeps working; only the storage backend changes. */

const hasArtifactStorage = typeof window !== 'undefined' && !!window.storage;

async function kvGet(key) {
  if (hasArtifactStorage) {
    try { const r = await window.storage.get(key); return r ? r.value : null; }
    catch (e) { return null; }
  }
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
async function kvSet(key, value) {
  if (hasArtifactStorage) {
    try { await window.storage.set(key, value); } catch (e) { console.error('Eroare salvare:', e); }
    return;
  }
  try { localStorage.setItem(key, value); } catch (e) { console.error('Eroare salvare:', e); }
}

/* -------------------------------- day model -------------------------------- */

function emptyDayLog() {
  return {
    meals: { breakfast: [], lunch: [], dinner: [], snack: [] },
    activity: { steps: 0, cardio: [], workout: { done: false, exercises: [] }, stretching: { done: false, exercises: [] } }
  };
}

/* Defends against partial/old data shapes so a malformed or older record
   never crashes the page — anything missing is filled in with safe defaults. */
function normalizeDayLog(raw) {
  const log = raw || {};
  log.meals = log.meals || {};
  MEAL_ORDER.forEach(mk => {
    log.meals[mk] = (Array.isArray(log.meals[mk]) ? log.meals[mk] : []).map(it => Object.assign(zeroNutrients(), it));
  });
  log.activity = log.activity || {};
  log.activity.steps = log.activity.steps || 0;
  log.activity.cardio = Array.isArray(log.activity.cardio) ? log.activity.cardio : [];
  log.activity.workout = log.activity.workout || { done: false, exercises: [] };
  log.activity.workout.exercises = Array.isArray(log.activity.workout.exercises) ? log.activity.workout.exercises : [];
  log.activity.stretching = log.activity.stretching || { done: false, exercises: [] };

/* ---------------------------------- state ---------------------------------- */

let targets = defaultTargets();
let weightLog = [];
let currentDate = todayStr();
let dayLog = emptyDayLog();
const dayCache = {};
let uiState = { cardioFormOpen: false, workoutFormOpen: false, stretchFormOpen: false };

async function loadDay(date) {
  if (dayCache[date]) return dayCache[date];
  const raw = await kvGet('day:' + date);
  let log = null;
  if (raw) { try { log = JSON.parse(raw); } catch (e) { log = null; } }
  if (!log) log = (date === todayStr()) ? seedTodayLog() : emptyDayLog();
  log = normalizeDayLog(log);
  dayCache[date] = log;
  return log;
}
function saveDay(date) { return kvSet('day:' + date, JSON.stringify(dayCache[date])); }

async function loadTargets() {
  const raw = await kvGet('targets');
  if (raw) { try { return Object.assign(defaultTargets(), JSON.parse(raw)); } catch (e) { /* fall through */ } }
  return defaultTargets();
}
function saveTargets() { return kvSet('targets', JSON.stringify(targets)); }

async function loadWeightLog() {
  const raw = await kvGet('weight-log');
  if (raw) { try { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length) return arr; } catch (e) { /* fall through */ } }
  return defaultWeightLog();
}
function saveWeightLog() { return kvSet('weight-log', JSON.stringify(weightLog)); }

function commitDay() {
  dayCache[currentDate] = dayLog;
  renderAll();
  saveDay(currentDate);
}

async function changeDay(delta) {
  const base = new Date(currentDate + 'T00:00:00');
  base.setDate(base.getDate() + delta);
  const newDate = isoDate(base);
  if (newDate > todayStr()) return;
  currentDate = newDate;
  uiState = { cardioFormOpen: false, workoutFormOpen: false, stretchFormOpen: false };
  dayLog = await loadDay(currentDate);
  renderAll();
}

function dayNavHtml() {
  const isToday = currentDate === todayStr();
  return '<div class="day-nav">' +
    '<button class="day-arrow" onclick="changeDay(-1)" aria-label="Ziua precedentă">‹</button>' +
    '<span class="day-label">' + dayLabel() + '</span>' +
    '<button class="day-arrow" onclick="changeDay(1)" ' + (isToday ? 'disabled' : '') + ' aria-label="Ziua următoare">›</button>' +
    '</div>';
}

function computeTotals() {

  MEAL_ORDER.forEach(mk => {
    dayLog.meals[mk].forEach(it => { NUTRIENTS.forEach(n => { t[n.key] += it[n.key] || 0; }); });
  });
  return t;
}

function addItemToLog(mealKey, item) {
  item.id = uid();

}
function removeItem(mealKey, id) {
  dayLog.meals[mealKey] = dayLog.meals[mealKey].filter(it => it.id !== id);
  commitDay();
}

function barRow(label, value, target, unit, color) {
  const pct = target > 0 ? Math.min(100, (value / target) * 100) : 0;
  const over = value > target;
  return '<div class="row"><div class="row-top"><span>' + label + '</span>' +
    '<span class="mono">' + fmt(value) + ' / ' + fmt(target) + ' ' + unit + '</span></div>' +
    '<div class="bar"><div class="fill" style="width:' + pct + '%;background:' + (over ? 'var(--danger)' : color) + '"></div></div></div>';
}

function renderHome() {
  const t = computeTotals();
  const overCal = t.calories > targets.calories;
  const macroColors = { protein: 'var(--accent-2)', carbs: 'var(--accent)', fat: '#ffd166' };
  const macroRows = MACRO_KEYS.map(key => {
    const n = NUTRIENTS.find(x => x.key === key);
    return barRow(n.label, t[key], targets[key], n.unit, macroColors[key]);
  }).join('');
  const microColors = ['var(--accent-2)', 'var(--accent)', '#ffd166', '#9ad0ff', '#e0a3ff', '#ffb3c6', '#c9ff8f', '#ffd9a0', '#8fd9a8'];
  const microRows = MICRO_KEYS.map((key, i) => {
    const n = NUTRIENTS.find(x => x.key === key);
    return barRow(n.label, t[key], targets[key], n.unit, microColors[i % microColors.length]);
  }).join('');

  const html = dayNavHtml() +
    '<div class="card hero">' +
      '<div class="eyebrow">Calorii</div>' +
      '<div class="hero-num">' + Math.round(t.calories) + '<span class="hero-target"> / ' + targets.calories + ' kcal</span></div>' +
      '<div class="bar lg"><div class="fill" style="width:' + Math.min(100, t.calories / targets.calories * 100) + '%;background:' + (overCal ? 'var(--danger)' : 'var(--accent)') + '"></div></div>' +
    '</div>' +
    '<div class="card"><div class="eyebrow">Macronutrienți</div>' + macroRows + '</div>' +
    '<div class="card"><div class="eyebrow">Micronutrienți</div>' + microRows + '</div>';

function round2(n) { return Math.round(n * 100) / 100; }
function weightSparkline() {
  const pts = weightLog;
  if (pts.length < 2) return '<p class="empty">Adaugă cel puțin două cântăriri pentru grafic.</p>';
  const w = 300, h = 90, pad = 10;
  const vals = pts.map(p => p.kg);
  const min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  const range = (max - min) || 1;
  const stepX = (w - 2 * pad) / (pts.length - 1);
  const coords = pts.map((p, i) => [round2(pad + i * stepX), round2(h - pad - ((p.kg - min) / range) * (h - 2 * pad))]);
  const path = 'M' + coords.map(c => c.join(',')).join(' L');
  const last = coords[coords.length - 1];
  const dots = coords.map(c => '<circle cx="' + c[0] + '" cy="' + c[1] + '" r="2.5" fill="var(--bg)" stroke="var(--accent)" stroke-width="1.5"/>').join('');
  return '<svg viewBox="0 0 ' + w + ' ' + h + '" class="spark">' +
    '<path d="' + path + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    dots + '<circle cx="' + last[0] + '" cy="' + last[1] + '" r="4.5" fill="var(--accent)"/></svg>';
}

function renderProgress() {
  const sorted = weightLog.slice().sort((a, b) => a.date.localeCompare(b.date));
  const first = sorted[0], last = sorted[sorted.length - 1];
  const delta = last && first ? round(last.kg - first.kg) : 0;
  const html =
    '<div class="card"><div class="eyebrow">Evoluție greutate</div>' +
    '<div class="row-top"><span class="hero-num small mono">' + (last ? last.kg : '—') + ' kg</span>' +
    '<span class="mono ' + (delta <= 0 ? 'good' : 'bad') + '">' + (delta > 0 ? '+' : '') + delta + ' kg</span></div>' +
    weightSparkline() + '</div>' +
    '<div class="card"><div class="eyebrow">Istoric</div><div class="item-list">' +
    sorted.slice().reverse().map(p => '<div class="item-row"><span class="mono dim">' + p.date + '</span><span class="mono">' + p.kg + ' kg</span></div>').join('') +
    '</div></div>';
  document.getElementById('progressContent').innerHTML = html;
}

/* ------------------------------- food lookup ------------------------------- */

let currentProduct = null;
let lastSearchResults = [];

function normalizeOFFProduct(product, code) {
  const n = product.nutriments || {};
  let kcal = n['energy-kcal_100g'];
  if (kcal === undefined || kcal === null) kcal = n['energy_100g'] ? n['energy_100g'] / 4.184 : 0;
  const per100 = { calories: kcal || 0 };
  NUTRIENTS.forEach(field => { if (field.off) per100[field.key] = (n[field.off] || 0) * field.toUnit; });
  return { code: code || product.code || '', name: product.product_name || 'Produs necunoscut', brand: product.brands || '', per100 };
}

function scanStatus(msg) { const el = document.getElementById('scanStatus'); if (el) el.textContent = msg; }

async function lookupBarcode(code) {
  code = (code || '').trim();
  if (!code) { scanStatus('Introduce un cod de bare valid.'); return; }
  scanStatus('Caut produsul cu codul ' + code + '…');
  try {
    const res = await fetch('https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(code) +
      '.json?fields=code,product_name,brands,nutriments,image_front_small_url');
    const data = await res.json();
    if (data.status !== 1 || !data.product) {
      scanStatus('Produsul cu codul ' + code + ' nu a fost găsit în Open Food Facts. Poți să-l adaugi manual mai jos.');
      return;
    }
    scanStatus('Produs găsit.');
    openConfirmSheet(normalizeOFFProduct(data.product, code));
  } catch (e) {
    scanStatus('Eroare de rețea la căutarea produsului. Verifică conexiunea la internet și încearcă din nou.');
  }
}

let searchDebounce = null;
function handleSearchInput(value) {
  clearTimeout(searchDebounce);
  if (!value || value.trim().length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
  searchDebounce = setTimeout(() => searchFood(value.trim()), 450);
}
async function searchFood(query) {
  document.getElementById('searchResults').innerHTML = '<p class="empty">Caut „' + escapeHtml(query) + '”…</p>';
  try {
    const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms=' + encodeURIComponent(query) +
      '&search_simple=1&action=process&json=1&page_size=8&fields=code,product_name,brands,nutriments';
    const res = await fetch(url);
    const data = await res.json();
    lastSearchResults = (data.products || []).filter(p => p.product_name);
    renderSearchResults();
  } catch (e) {
    document.getElementById('searchResults').innerHTML = '<p class="empty">Eroare de rețea la căutare. Încearcă din nou.</p>';
  }
}
function renderSearchResults() {
  const container = document.getElementById('searchResults');
  if (lastSearchResults.length === 0) {
    container.innerHTML = '<p class="empty">Niciun rezultat. Încearcă alt termen sau adaugă manual mai jos.</p>';
    return;
  }
  container.innerHTML = lastSearchResults.map((p, i) => {
    const kcal = p.nutriments && p.nutriments['energy-kcal_100g'];
    return '<button class="result-row" onclick="selectSearchResult(' + i + ')">' +
      '<span class="item-name">' + escapeHtml(p.product_name) + '</span>' +
      '<span class="item-sub mono dim">' + escapeHtml(p.brands || '') + (kcal ? ' · ' + Math.round(kcal) + ' kcal/100g' : '') + '</span></button>';
  }).join('');
}
function selectSearchResult(i) {
  const p = lastSearchResults[i];
  if (!p) return;
  openConfirmSheet(normalizeOFFProduct(p, p.code));
}

function openConfirmSheet(prod) {
  currentProduct = prod;
  const mealOptions = MEAL_ORDER.map(mk =>
    '<option value="' + mk + '"' + (mk === defaultMealForNow() ? ' selected' : '') + '>' + MEAL_LABELS[mk] + '</option>'
  ).join('');
  const html =

  document.getElementById('sheetContent').innerHTML = html;
  document.getElementById('sheetOverlay').classList.add('active');
  recomputeSheet();

function defaultMealForNow() {
  const h = new Date().getHours();
  if (h < 11) return 'breakfast';
  if (h < 16) return 'lunch';
  if (h < 21) return 'dinner';

function recomputeSheet() {
  if (!currentProduct) return;
  const grams = parseFloat(document.getElementById('sheetGrams').value) || 0;
  const f = grams / 100;
  const p = currentProduct.per100;
  const html = NUTRIENTS.map(n => {
    const val = (p[n.key] || 0) * f;
    const display = n.key === 'calories' ? Math.round(val) : fmt(val);
    return '<div>' + n.label + ': ' + display + ' ' + n.unit + '</div>';
  }).join('');
  document.getElementById('sheetPreview').innerHTML = html;
}
function confirmAddFromSheet() {
  if (!currentProduct) return;
  const grams = parseFloat(document.getElementById('sheetGrams').value) || 0;
  const meal = document.getElementById('sheetMeal').value;
  const f = grams / 100;
  const item = { name: currentProduct.name, grams };

  addItemToLog(meal, item);
  closeSheet();
}

let html5QrCode = null;
let scanning = false;

async function startScanner() {
  if (typeof Html5Qrcode === 'undefined') {
    scanStatus('Biblioteca de scanare nu s-a încărcat. Folosește introducerea manuală a codului mai jos.');
    return;
  }
  document.getElementById('scanWrap').style.display = 'block';
  document.getElementById('scanStartBtn').style.display = 'none';
  document.getElementById('scanStopBtn').style.display = 'block';
  scanStatus('Pornesc camera…');
  try {
    html5QrCode = new Html5Qrcode('reader');
    const formats = [
      Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.ITF
    ];
    await html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 260, height: 140 }, formatsToSupport: formats },
      onScanSuccess,
      () => {}
    );
    scanning = true;
    scanStatus('Caut codul de bare… ține-l drept, în chenar.');
  } catch (err) {
    scanStatus('Camera nu este disponibilă aici (permisiune blocată sau pagina nu rulează pe HTTPS/localhost). Folosește introducerea manuală mai jos — funcționează oricum.');
    document.getElementById('scanStartBtn').style.display = 'block';
    document.getElementById('scanStopBtn').style.display = 'none';
    document.getElementById('scanWrap').style.display = 'none';
  }
}
async function onScanSuccess(decodedText) {
  if (!scanning) return;
  await stopScanner();
  lookupBarcode(decodedText);
}
async function stopScanner() {
  if (html5QrCode && scanning) { try { await html5QrCode.stop(); html5QrCode.clear(); } catch (e) { /* ignore */ } }
  scanning = false;
  document.getElementById('scanWrap').style.display = 'none';
  document.getElementById('scanStartBtn').style.display = 'block';
  document.getElementById('scanStopBtn').style.display = 'none';

let obsidianHandle = null; // FileSystemDirectoryHandle, session-only

/* ---- IDB persistence so the user only picks the vault ONCE ---- */
const IDB_DB = 'nutritrack-v1';
const IDB_STORE = 'handles';
const IDB_KEY = 'vault';

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_DB, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch (e) { return null; }
}
async function idbSet(key, value) {
  try {
    const db = await openIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = resolve;
      tx.onerror = () => resolve();
    });
  } catch (e) { /* ignore */ }
}

async function loadSavedVaultHandle() {
  if (obsidianHandle) return obsidianHandle;
  const saved = await idbGet(IDB_KEY);
  if (!saved) return null;
  try {
    const perm = await saved.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') { obsidianHandle = saved; return saved; }
    const req = await saved.requestPermission({ mode: 'readwrite' });
    if (req === 'granted') { obsidianHandle = saved; return saved; }
  } catch (e) { /* stale handle */ }
  return null;
}

async function pickVaultFolder() {
  if (!window.showDirectoryPicker) return null;
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite', startIn: 'documents' });
    obsidianHandle = handle;
    await idbSet(IDB_KEY, handle);
    return handle;
  } catch (e) {
    if (e.name !== 'AbortError') console.error('showDirectoryPicker:', e);
    return null;
  }
}

async function getOrPickVault() {
  const saved = await loadSavedVaultHandle();
  if (saved) return saved;
  return pickVaultFolder();
}

/* ---- Markdown generation ---- */

function pad2(n) { return String(n).padStart(2, '0'); }
function roDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
  return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function generateDayMarkdown(date, log, tgts) {
  const t = zeroNutrients();
  MEAL_ORDER.forEach(mk => {
    (log.meals[mk] || []).forEach(it => { NUTRIENTS.forEach(n => { t[n.key] += it[n.key] || 0; }); });
  });

  function pct(val, target) { return target > 0 ? Math.round(Math.min(100, val / target * 100)) : 0; }
  function bar(val, target) {
    const p = pct(val, target);
    const filled = Math.round(p / 10);
    return '`' + '█'.repeat(filled) + '░'.repeat(10 - filled) + '` ' + p + '%';
  }

  // YAML frontmatter (Dataview-compatible)
  let md = '---\n';
  md += 'date: ' + date + '\n';
  md += 'calories: ' + Math.round(t.calories) + '\n';
  MACRO_KEYS.forEach(key => { md += key + ': ' + fmt(t[key]) + '\n'; });
  MICRO_KEYS.forEach(key => { md += key.toLowerCase() + ': ' + fmt(t[key]) + '\n'; });
  md += 'steps: ' + (log.activity.steps || 0) + '\n';
  md += 'workout: ' + (log.activity.workout && log.activity.workout.done ? 'true' : 'false') + '\n';
  md += 'stretching: ' + (log.activity.stretching && log.activity.stretching.done ? 'true' : 'false') + '\n';
  md += 'tags: [nutritrack]\n';
  md += '---\n\n';

  // Title
  md += '# 🥗 NutriTrack — ' + roDate(date) + '\n\n';

  // Calories hero
  md += '## ⚡ Calorii\n\n';
  md += '> **' + Math.round(t.calories) + ' / ' + tgts.calories + ' kcal** ' + bar(t.calories, tgts.calories) + '\n\n';

  // Macros table
  md += '## 🥩 Macronutrienți\n\n';
  md += '| Nutrient | Consumat | Țintă | Progres |\n';
  md += '|---|---|---|---|\n';
  MACRO_KEYS.forEach(key => {
    const n = NUTRIENTS.find(x => x.key === key);
    md += '| ' + n.label + ' | **' + fmt(t[key]) + ' ' + n.unit + '** | ' + fmt(tgts[key]) + ' ' + n.unit + ' | ' + bar(t[key], tgts[key]) + ' |\n';
  });
  md += '\n';

  // Micros table
  md += '## 🔬 Micronutrienți\n\n';
  md += '| Nutrient | Consumat | Țintă | Progres |\n';
  md += '|---|---|---|---|\n';
  MICRO_KEYS.forEach(key => {
    const n = NUTRIENTS.find(x => x.key === key);
    md += '| ' + n.label + ' | **' + fmt(t[key]) + ' ' + n.unit + '** | ' + fmt(tgts[key]) + ' ' + n.unit + ' | ' + bar(t[key], tgts[key]) + ' |\n';
  });
  md += '\n';

  // Meals
  md += '## 🍽️ Mese\n\n';
  MEAL_ORDER.forEach(mk => {
    const items = log.meals[mk] || [];
    const subtotal = items.reduce((s, it) => s + (it.calories || 0), 0);
    if (items.length === 0) return;
    md += '### ' + MEAL_LABELS[mk] + ' — ' + Math.round(subtotal) + ' kcal\n\n';
    items.forEach(it => {
      md += '- **' + it.name + '** — ' + fmt(it.grams) + 'g · ' + Math.round(it.calories) + ' kcal';
      const macroStr = MACRO_KEYS.map(key => {
        const n = NUTRIENTS.find(x => x.key === key);
        return n.label.toLowerCase() + ' ' + fmt(it[key]) + ' ' + n.unit;
      }).join(', ');
      md += ' (' + macroStr + ')\n';
    });
    md += '\n';
  });

  // Activity
  md += '## 🏃 Activitate\n\n';
  const a = log.activity;
  md += '**Pași:** ' + (a.steps || 0) + '\n\n';

  if (a.cardio && a.cardio.length > 0) {
    const totalMin = a.cardio.reduce((s, c) => s + (c.minutes || 0), 0);
    md += '### Cardio — ' + totalMin + ' min total\n\n';
    a.cardio.forEach(c => { md += '- ' + (c.type || 'Cardio') + ' · ' + (c.minutes || 0) + ' min\n'; });
    md += '\n';
  } else {
    md += '**Cardio:** —\n\n';
  }

  md += '### Sală\n\n';
  if (a.workout && a.workout.done) {
    md += '✅ Am fost la sală\n\n';
    (a.workout.exercises || []).forEach(e => {
      md += '- **' + e.name + '**' + (e.detail ? ' — ' + e.detail : '') + '\n';
    });
    if ((a.workout.exercises || []).length > 0) md += '\n';
  } else {
    md += '❌ Pauză azi\n\n';
  }

  md += '### Stretching\n\n';
  if (a.stretching && a.stretching.done) {
    const strMin = (a.stretching.exercises || []).reduce((s, e) => s + (e.minutes || 0), 0);
    md += '✅ Stretching făcut' + (strMin > 0 ? ' — ' + strMin + ' min total' : '') + '\n\n';
    (a.stretching.exercises || []).forEach(e => {
      md += '- **' + e.name + '**' + (e.minutes ? ' · ' + e.minutes + ' min' : '') + '\n';
    });
    if ((a.stretching.exercises || []).length > 0) md += '\n';
  } else {
    md += '❌ Stretching nefăcut\n\n';
  }

  md += '---\n*Generat de NutriTrack · ' + new Date().toLocaleString('ro-RO') + '*\n';
  return md;
}

/* ---- File writing helpers ---- */

async function writeFileToVault(vaultHandle, relativePath, content) {
  const parts = relativePath.split('/');
  let dir = vaultHandle;
  for (let i = 0; i < parts.length - 1; i++) {
    dir = await dir.getDirectoryHandle(parts[i], { create: true });
  }
  const fileHandle = await dir.getFileHandle(parts[parts.length - 1], { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(content);
  await writable.close();
}

/* ---- Public API ---- */

async function exportCurrentDayToObsidian() {
  openObsidianSheet('exporting');
  const vault = await getOrPickVault();
  if (!vault) { openObsidianSheet('idle', 'Niciun folder selectat.'); return; }
  try {
    const log = dayLog;
    const content = generateDayMarkdown(currentDate, log, targets);
    const filename = 'NutriTrack/' + currentDate + '.md';
    await writeFileToVault(vault, filename, content);
    openObsidianSheet('done', '✅ Exportat: ' + filename + '\nVault: ' + vault.name);
  } catch (e) {
    openObsidianSheet('idle', '❌ Eroare la scriere: ' + e.message);
  }
}

async function exportAllDaysToObsidian() {
  openObsidianSheet('exporting');
  const vault = await getOrPickVault();
  if (!vault) { openObsidianSheet('idle', 'Niciun folder selectat.'); return; }
  try {
    // Collect all known day keys from storage
    let dateKeys = [];
    if (hasArtifactStorage) {
      const res = await window.storage.list('day:');
      dateKeys = (res.keys || []).map(k => k.replace('day:', ''));
    } else {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('day:')) dateKeys.push(k.replace('day:', ''));
      }
    }
    // Also include any days currently in the cache
    Object.keys(dayCache).forEach(d => { if (!dateKeys.includes(d)) dateKeys.push(d); });
    if (dateKeys.length === 0) { openObsidianSheet('idle', 'Nu există zile de exportat.'); return; }
    dateKeys.sort();
    let count = 0;
    for (const date of dateKeys) {
      let log = dayCache[date];
      if (!log) {
        const raw = await kvGet('day:' + date);
        if (!raw) continue;
        try { log = normalizeDayLog(JSON.parse(raw)); } catch (e) { continue; }
      }
      const content = generateDayMarkdown(date, log, targets);
      await writeFileToVault(vault, 'NutriTrack/' + date + '.md', content);
      count++;
    }
    openObsidianSheet('done', '✅ Exportate ' + count + ' zile în NutriTrack/\nVault: ' + vault.name);
  } catch (e) {
    openObsidianSheet('idle', '❌ Eroare: ' + e.message);
  }
}

  const handle = await pickVaultFolder();
  if (handle) openObsidianSheet('idle', 'Vault selectat: ' + handle.name);
  else openObsidianSheet('idle', 'Operație anulată.');
}

async function openObsidianSheet(mode, msg) {

      'Funcția de scriere directă în Obsidian necesită Chrome sau Edge pe desktop.<br>' +
      'Pe alte browsere poți folosi exportul manual (descarcă .md).</div>' +

      '<button class="btn" onclick="exportAllManual()">⬇ Descarcă arhivă .zip</button>';
  } else if (mode === 'exporting') {
    body = '<p class="dim">Se exportă… ⏳</p>';
  } else if (mode === 'done') {
    body = '<div class="obs-ok">' + escapeHtml(msg || '').replace(/\n/g, '<br>') + '</div>' +
      '<button class="btn primary" onclick="exportCurrentDayToObsidian()">📤 Exportă din nou azi</button>' +
      '<button class="btn" onclick="exportAllDaysToObsidian()">📦 Exportă toate zilele</button>' +

      (msg ? '<p class="dim">' + escapeHtml(msg).replace(/\n/g, '<br>') + '</p>' : '') +
      (vaultName
        ? '<button class="btn primary" onclick="exportCurrentDayToObsidian()">📤 Exportă ziua curentă (' + currentDate + ')</button>' +
          '<button class="btn" onclick="exportAllDaysToObsidian()">📦 Exportă toate zilele din jurnal</button>' +
          '<button class="btn ghost" onclick="changeVaultFolder()">📁 Schimbă vaultul</button>'
        : '<p style="color:var(--text-dim);font-size:13px">Selectează folderul vaultului tău Obsidian (nu trebuie să fie rădăcina — poate fi un subfolder). NutriTrack va crea automat un subfolder <code>NutriTrack/</code> în el.</p>' +
          '<button class="btn primary" onclick="changeVaultFolder()">📁 Selectează vaultul Obsidian</button>');
  }

  document.getElementById('sheetContent').innerHTML =
    '<div class="sheet-header"><h3>📤 Export Obsidian</h3><button class="icon-btn" onclick="closeSheet()">✕</button></div>' +
    body;
  document.getElementById('sheetOverlay').classList.add('active');
}

/* ---- Manual download fallbacks (for Firefox / Safari) ---- */

function exportCurrentDayManual() {
  const content = generateDayMarkdown(currentDate, dayLog, targets);
  downloadText(content, currentDate + '.md');
}

async function exportAllManual() {
  // Collect all days and download as individual files (zip would require a lib; just do one at a time for now)
  let dates = [currentDate];
  if (hasArtifactStorage) {
    try { const r = await window.storage.list('day:'); dates = (r.keys || []).map(k => k.replace('day:', '')); } catch(e) {}
  } else {
    dates = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('day:')) dates.push(k.replace('day:', ''));
    }
  }
  Object.keys(dayCache).forEach(d => { if (!dates.includes(d)) dates.push(d); });
  dates.sort();
  for (const date of dates) {
    let log = dayCache[date];
    if (!log) { try { const raw = await kvGet('day:' + date); if (raw) log = normalizeDayLog(JSON.parse(raw)); } catch(e){} }
    if (!log) continue;
    downloadText(generateDayMarkdown(date, log, targets), date + '.md');
    await new Promise(r => setTimeout(r, 150)); // small delay between downloads so browser doesn't block
  }
}

function downloadText(content, filename) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
